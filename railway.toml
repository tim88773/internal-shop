version = 1

[railway]
  # ===========================================
  #  Railway Volume: shop-data
  #  Mount the volume at /data so the database
  #  survives deploys.
  #
  #  To create the volume:
  #   1. Go to Railway Dashboard > your-project
  #   2. Click "Volumes" in the sidebar
  #   3. Create a volume named "shop-data"
  #      with mount path "/data"
  #   4. Set env var DATA_DIR=/data in your
  #      service settings
  #   5. Redeploy
  # ===========================================
  volumes = [{ name = "shop-data", mount = "/data" }]
